name: Import portfolio assets

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download Framer assets locally
        run: node scripts/download-assets.mjs

      - name: Commit downloaded assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Нет изменений — возможно, картинки уже перенесены."
          else
            git commit -m "Import Framer assets locally and rewrite links"
            git push
          fi
